run_dir: outputs/run_beer_demo_questionnaire
output_dir: outputs/run_beer_demo_questionnaire/analysis

load:
  resolve_sources: true
  prefer_extra_paths: true
  strict_source_resolution: false

summaries:
  run: true
  outcomes: true
  traces: true
  selections: true

metrics:
  quality: true
  diversity: true
  persona: true
  selection: true

plots:
  outcome_distributions:
    enabled: true
    normalize_to_share: false
    fields: null
    figsize: [7, 4.5]

  panelist_summary:
    enabled: true
    outcome_field: rating
    metrics: [mean, variance]
    max_items: 30
    sort_by: label_asc
    horizontal: false

  product_summary:
    enabled: true
    outcome_field: rating
    metrics: [mean, variance]
    max_items: 30
    sort_by: label_asc
    horizontal: false

  selection_concentration:
    enabled: true
    modes: [executed, requested]
    top_k: 15
    horizontal: true

regression:
  enabled: true
  save_results: true
  output_subdir: regression

  options:
    drop_missing: true
    standardize_numeric: false
    add_intercept: true
    max_iter: 200
    include_inference: true
    confidence_level: 0.95
    covariance_type: cluster_panelist

  specs:
    - family: ordered_logit
      design: panelist_features
      outcome_field: rating
    
    - family: ordered_probit
      design: panelist_features
      outcome_field: rating

    - family: probit
      design: panelist_features
      outcome_field: usefulness
    
    - family: logit
      design: panelist_features
      outcome_field: usefulness

export:
  csv: true
  json: true
  markdown: true
  overwrite: true