# Recover the original few-shot experiment under the revamped prompt interface.
# This file is intended to preserve the earlier beer-domain few-shot behavior
# while keeping the core few-shot strategy itself general.

# Note: Change to the actual output_dir.
output_dir: /home/bd58/data/bd58/sim-panel/run_beer_demo_large_self_selection_few_shot_recovered

# Note: Change to match the original setup.
backend:
  name: ollama
  model: gemma3:12b
  return_usage: true
  params:
    base_url: "http://localhost:11434"
    timeout_s: 120

generator:
  schema_version: "0.1.0"
  seed: 101
  n_periods: 1
  validate_on_finish: true
  max_errors: 50
  event_namespace: "sim_panel.v0"
  max_workers: 16
  prompting_strategy: few_shot

panelists:
  source: data/personas_beer_demo_large.jsonl
  variant: default

  enrich:
    enabled: true
    overwrite: false
    save: in_place
    settings:
      prompt_version: v1
      temperature: 0.2
      max_tokens: 600
      max_workers: 16
      metadata: {module: panelists.enrich}

  select_settings:
    temperature: 0.2
    max_tokens: 500
    metadata: {module: panelists.select}

  eval_settings:
    temperature: 0.2
    max_tokens: 900
    metadata: {module: panelists.evaluate}

products:
  source: data/products_beer_demo_large.jsonl
  variant: default

  enrich:
    enabled: true
    overwrite: false
    save: in_place
    settings:
      prompt_version: v1
      campaign: "beer-demo"
      tone: neutral
      length: short
      temperature: 0.2
      max_tokens: 320
      max_workers: 16
      metadata: {module: products.enrich}

policy:
  name: self_selection
  choice_set_size: null
  allow_empty_selection: true

selection:
  allow_empty: true
  include_product_features: true
  require_json_only: true
  max_selected_soft: 5
  include_raw_text: true

  # Revamped interface: optional experiment-specific exemplar for few-shot.
  # Built-in few-shot remains general if this block is absent.
  custom_few_shot_example:
    intro: "Given products about craft beverages, a respondent might select:"
    response:
      # Reserved placeholders are resolved against the actual shown choice set.
      # This preserves the spirit of the earlier experiment while avoiding
      # invalid copied product_ids.
      selected_product_ids: ["__FIRST_SHOWN__", "__THIRD_SHOWN_IF_AVAILABLE__"]
      traces:
        reasoning: "Selected based on personal taste preferences."

execution:
  enforce_subset_of_choice_set: true
  max_evals_per_panelist_per_t: 3
  allow_empty: true
  keep_strategy: keep_first

outcomes_model:
  name: llm
  temperature: 0.2
  max_tokens: 900
  include_raw_text: true

  custom_few_shot_example:
    intro: "For a product like 'Classic Lager - A traditional pale lager with crisp finish', a respondent might answer:"
    response:
      outcomes:
        rating: 7
        purchase_intent: "maybe"
      traces:
        rationale: "Solid traditional beer, nothing exceptional but reliable."

questionnaire:
  outcomes:
    fields:
      rating:
        type: int
        choices: [1, 2, 3, 4, 5]
        question: "Overall, how much do you like this beer?"
        instruction: "Pick one integer."
        required: true

      purchase_intent:
        type: categorical
        choices: ["no", "maybe", "yes"]
        question: "How likely are you to purchase this beer in the next 30 days?"
        instruction: "Choose one option."
        required: true

      bitterness:
        type: int
        choices: [1, 2, 3, 4, 5]
        question: "How bitter does this beer taste to you?"
        instruction: "Pick one integer (1=not bitter, 5=very bitter)."
        required: false

  traces:
    fields:
      rationale:
        type: text
        question: "Briefly explain your answers."
        required: false