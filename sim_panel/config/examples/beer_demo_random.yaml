# Example run config: beer demo + random assignment policy (LLM-based evaluation)

output_dir: outputs/run_beer_demo_random

backend:
  name: ollama
  model: gemma3:12b
  return_usage: true
  params:
    base_url: "http://localhost:11434"
    timeout_s: 60

generator:
  schema_version: "0.1.0"
  seed: 101
  n_periods: 2
  validate_on_finish: true
  max_errors: 50
  event_namespace: "sim_panel.v0"

panelists:
  source: data/personas_beer_demo.jsonl
  variant: default

  # If persona_text is missing, enable persisted enrichment once:
  # enrich:
  #   enabled: true
  #   overwrite: false
  #   save: in_place
  #   settings:
  #     prompt_version: v1
  #     temperature: 0.2
  #     max_tokens: 600
  #     metadata: {module: panelists.enrich}

  eval_settings:
    temperature: 0.2
    max_tokens: 900
    metadata: {module: panelists.evaluate}

products:
  source: data/products_beer_demo.jsonl
  variant: default

  # If display_text is missing, enable persisted enrichment once:
  # enrich:
  #   enabled: true
  #   overwrite: false
  #   save: in_place
  #   settings:
  #     prompt_version: v1
  #     campaign: "beer-demo"
  #     tone: neutral
  #     length: short
  #     temperature: 0.2
  #     max_tokens: 320
  #     metadata: {module: products.enrich}

policy:
  name: random
  evals_per_period: 1
  random_mode: balanced_quota

# Selection config is unused by random policy, but kept for consistency.
selection:
  allow_empty: true
  include_product_features: true
  require_json_only: true
  max_selected_soft: null
  include_raw_text: false

execution:
  enforce_subset_of_choice_set: true
  max_evals_per_panelist_per_t: null
  allow_empty: true
  keep_strategy: keep_first

outcomes_model:
  name: llm
  temperature: 0.2
  max_tokens: 900
  include_raw_text: true

questionnaire:
  outcomes:
    fields:
      rating:
        type: int
        choices: [1, 2, 3, 4, 5]
        question: "Overall, how much do you like this beer?"
        instruction: "Pick one integer."
        required: true

      purchase_intent:
        type: categorical
        choices: ["no", "maybe", "yes"]
        question: "How likely are you to purchase this beer in the next 30 days?"
        instruction: "Choose one option."
        required: true

      bitterness:
        type: int
        choices: [1, 2, 3, 4, 5]
        question: "How bitter does this beer taste to you?"
        instruction: "Pick one integer (1=not bitter, 5=very bitter)."
        required: false

  traces:
    fields:
      rationale:
        type: text
        question: "Briefly explain your answers."
        required: false