# Self-selection example:
# - Panelists select which products to evaluate
# - Generator applies an execution cap (operational budget)
# - Deterministic outcomes (no backend required) by default

output_dir: outputs/run_self_selection

generator:
  schema_version: "0.1.0"
  seed: 7
  n_periods: 2
  validate_on_finish: true
  max_errors: 50
  event_namespace: "sim_panel.v0"

panelists:
  source: data/personas.jsonl
  variant: default
  # Backend is required if you actually run selection/evaluation as LLM calls.
  # For deterministic smoke tests, you can still run with backend omitted if your
  # generator/panelist calls are not invoked (but self_selection invokes select()).
  # In practice: provide backend for self_selection runs.

products:
  source: data/products.jsonl
  variant: default

backend:
  name: ollama
  model: llama3.1
  return_usage: true
  params:
    base_url: "http://localhost:11435"
    timeout_s: 60

policy:
  name: self_selection
  # self-selection exposure rule: show all products by default
  choice_set_size: null
  allow_empty_selection: true

selection:
  allow_empty: true
  include_product_features: true
  require_json_only: true
  # Soft hint only; panelist may ignore it
  max_selected_soft: 5
  include_raw_text: true

execution:
  # Operational rule: we only execute up to K evaluations per panelist per period
  enforce_subset_of_choice_set: true
  max_evals_per_panelist_per_t: 3
  allow_empty: true
  keep_strategy: keep_first

outcomes_model:
  # If you want fully LLM-based evaluation, switch to llm + provide questionnaire
  name: deterministic
  include_raw_text: false

questionnaire:
  outcomes:
    fields:
      rating:
        type: int
        choices: [1, 2, 3, 4, 5]
        question: "Overall, how much do you like this product?"
        required: true
  traces:
    fields:
      rationale:
        type: text
        question: "Optional: why?"
        required: false